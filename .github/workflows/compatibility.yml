# .github/workflows/compatibility.yml
name: Compatibility matrix

on:
  push:
    branches: [pyobjc-compatibility]
  pull_request:
  workflow_dispatch:

# Runners available as of 2026:
#   macos-13  x86_64  Ventura   Darwin 22.x  ← last Intel runner, being phased out
#   macos-14  arm64   Sonoma    Darwin 23.x
#   macos-15  arm64   Sequoia   Darwin 24.x
#
# NOT available on GitHub-hosted runners:
#   macOS 12 Monterey (Darwin 21.x) ← the <22.0 osxphotos branch; test locally
#   macOS 26           (Darwin 25.x) ← your current machine; test locally

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-13, macos-14, macos-15, macos-26]
        python: ["3.12", "3.13", "3.14"]
        exclude:
          # macos-13 is Intel/x86_64; pyobjc 12.1 cp314 wheel is universal2 so it works,
          # but flag it as a known-fragile combination in the job name
          - os: macos-13
            python: "3.14"

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} · py${{ matrix.python }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true   # required until 3.14 stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # ── platform report ────────────────────────────────────────────────────
      - name: Platform info
        run: |
          python - <<'EOF'
          import platform, sys
          mac, _, machine = platform.mac_ver()
          print(f"Python  : {sys.version}")
          print(f"macOS   : {mac}")
          print(f"Darwin  : {platform.release()}")
          print(f"Machine : {machine or platform.machine()}")
          EOF

      # ── fresh resolve ───────────────────────────────────────────────────────
      - name: Clean lock and sync
        run: |
          rm -f uv.lock
          uv sync

      # ── assert correct pyobjc branch was selected ──────────────────────────
      - name: Assert pyobjc >= 10.0
        run: |
            uv run python - <<'EOF'
            from importlib.metadata import version, PackageNotFoundError

            def v(s):
                return tuple(int(x) for x in s.split(".")[:2])

            PACKAGES = [
                "pyobjc-core",
                "pyobjc-framework-avfoundation",
                "pyobjc-framework-cocoa",
                "pyobjc-framework-photos",
                "pyobjc-framework-quartz",
                "pyobjc-framework-vision",
            ]

            failures = []
            for pkg in PACKAGES:
                try:
                    ver = version(pkg)
                    ok = v(ver) >= (10, 0)
                    print(f"  {'OK  ' if ok else 'FAIL'} {pkg}=={ver}")
                    if not ok:
                        failures.append(f"{pkg}=={ver}")
                except PackageNotFoundError:
                    print(f"  SKIP {pkg} (not installed)")

            if failures:
                raise SystemExit("\nFAIL: pyobjc < 10 resolved:\n  " + "\n  ".join(failures))

            print("\nAll pyobjc packages >= 10.0")
            EOF

      # ── import smoke test ───────────────────────────────────────────────────
      - name: Framework import smoke test
        run: |
          uv run python - <<'EOF'
          import objc
          import Foundation
          import AVFoundation
          import Photos
          import Quartz
          print("Framework imports OK")
          EOF

      # ── osxphotos smoke test ────────────────────────────────────────────────
      - name: osxphotos import
        run: uv run python -c "import osxphotos; print('osxphotos', osxphotos.__version__, 'OK')"

  # ── summary job so branch protection only needs one required check ─────────
  ci:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "One or more matrix jobs failed"
            exit 1
          fi
          echo "All matrix jobs passed"